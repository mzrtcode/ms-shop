server:
  port: 8082

spring:
#  application:
#    name: inventory-service
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:mysql://localhost:3306/inventory-db
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

management:
  endpoints:
    web:
      exposure:
        include: "health,refresh"

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

inventory:
  allow-backorders: true