server:
  port: 8081

spring:
  # 🚀 Java 21 Performance
  threads:
    virtual:
      enabled: true

  datasource:
    url: jdbc:postgresql://localhost:5432/order-db
    username: admin
    password: admin
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

management:
  endpoints:
    web:
      exposure:
        include: "health,refresh"

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

order:
  enabled: true