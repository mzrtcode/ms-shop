server:
  port: 0

spring:
  # 🚀 Java 21 Performance
  threads:
    virtual:
      enabled: true

  datasource:
    url: jdbc:postgresql://localhost:5432/order-db
    username: admin
    password: admin
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  security:
    oauth2:
      resource-server:
        jwt:
          issuer-uri: http://localhost:8080/realms/ecommerce_realm
management:
  endpoints:
    web:
      exposure:
        include: health,refresh,circuitbreakers,circuitbreakerevents

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

order:
  enabled: true
  
resilience4j:
  circuitbreaker:
    instances:
      inventory:
        registerHealthIndicator: true
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 5s
        permittedNumberOfCallsInHalfOpenState: 3
  retry:
    instances:
      inventory:
        maxRetryAttempts: 3
        waitDuration: 2s
        enableExponentialBackOff: true
        exponentialBackoffMultiplier: 2

    timelimiter:
      instances:
        inventory:
          timeoutDuration: 3s
          cancelRunningFuture: true